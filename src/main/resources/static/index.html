<!DOCTYPE html>
<html>
<head>
<title>Disaster Resource Mapping Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f9;
}

header{
background:#1e4fa3;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
display:flex;
gap:20px;
padding:20px;
}

.sidebar{
width:300px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.content{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e4fa3;
color:white;
}

button:hover{
background:#163d82;
}

.delete-btn{
background:#d9534f;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#1e4fa3;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#f2f2f2;
}

#map{
height:450px;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
🚨 Disaster Resource Mapping Dashboard
</header>

<div class="container">

<div class="sidebar">

<h3>Add Resource</h3>

<input id="name" placeholder="Resource Name">

<select id="type">
<option>Hospital</option>
<option>Ambulance</option>
<option>Shelter</option>
<option>Rescue Team</option>
</select>

<select id="disaster">
<option>Earthquake</option>
<option>Flood</option>
<option>Fire</option>
<option>Landslide</option>
</select>

<select id="severity">
<option>LOW</option>
<option>MEDIUM</option>
<option>HIGH</option>
</select>

<input id="latitude" placeholder="Latitude">

<input id="longitude" placeholder="Longitude">

<select id="available">
<option value="true">Available</option>
<option value="false">Unavailable</option>
</select>

<button onclick="addResource()">Add Resource</button>

</div>


<div class="content">

<h3>Resource List</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Type</th>
<th>Disaster</th>
<th>Severity</th>
<th>Status</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<h3>Live Map View</h3>

<div id="map"></div>

</div>

</div>


<script>

let map = L.map('map').setView([30.3165,78.0322],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);


function loadResources(){

fetch("/resources")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("tableBody");

table.innerHTML="";

map.eachLayer(layer=>{
if(layer instanceof L.Marker)
map.removeLayer(layer);
});

data.forEach(r=>{

table.innerHTML+=`

<tr>

<td>${r.id}</td>
<td>${r.name}</td>
<td>${r.type}</td>
<td>${r.disaster}</td>
<td>${r.severity}</td>
<td>${r.available?"✅":"❌"}</td>

<td>
<button class="delete-btn"
onclick="deleteResource(${r.id})">
Delete
</button>
</td>

</tr>
`;

if(r.latitude && r.longitude){

L.marker([r.latitude,r.longitude])
.addTo(map)
.bindPopup(`<b>${r.name}</b><br>${r.type}`);

}

});

});

}


function addResource(){

let resource={

name:document.getElementById("name").value,
type:document.getElementById("type").value,
disaster:document.getElementById("disaster").value,
severity:document.getElementById("severity").value,
latitude:parseFloat(document.getElementById("latitude").value),
longitude:parseFloat(document.getElementById("longitude").value),
available:document.getElementById("available").value==="true"

};

fetch("/resources",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(resource)

})

.then(()=>{

loadResources();

});

}


function deleteResource(id){

fetch(`/resources/${id}`,{

method:"DELETE"

})

.then(()=>{

loadResources();

});

}


loadResources();

</script>

</body>
</html>
