<!DOCTYPE html>
<html>
<head>

<title>Disaster Response Command Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
font-size:24px;
text-align:center;
font-weight:bold;
}

.container{
width:92%;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
box-shadow:0px 4px 12px rgba(0,0,0,0.12);
}

input,select{
padding:8px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0d47a1;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1565c0;
}

.delete-btn{
background:#d32f2f;
}

.delete-btn:hover{
background:#f44336;
}

#map{
height:500px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#0d47a1;
color:white;
padding:10px;
}

td{
padding:8px;
text-align:center;
}

tr:nth-child(even){
background:#f2f2f2;
}

</style>

</head>


<body>

<header>
🚨 Disaster Response Resource Mapping Dashboard
</header>


<div class="container">


<div class="card">

<h3>Add / Update Resource</h3>

<input id="name" placeholder="Resource Name">

<select id="type">
<option>Hospital</option>
<option>Ambulance</option>
<option>Shelter</option>
<option>Rescue Team</option>
</select>

<select id="disasterType">
<option>Flood</option>
<option>Earthquake</option>
<option>Fire</option>
<option>Landslide</option>
<option>Cyclone</option>
</select>

<select id="severity">
<option>LOW</option>
<option>MEDIUM</option>
<option>HIGH</option>
<option>CRITICAL</option>
</select>

<input id="latitude" placeholder="Latitude">

<input id="longitude" placeholder="Longitude">

<select id="available">
<option value="true">Available</option>
<option value="false">Unavailable</option>
</select>

<button onclick="addResource()">Add Resource</button>

</div>



<div class="card">

<h3>Search Resource</h3>

<input id="searchBox" placeholder="Search by name">

<button onclick="searchResource()">Search</button>

<button onclick="loadResources()">Reset</button>

</div>



<div class="card">

<h3>Resource List</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Type</th>
<th>Disaster</th>
<th>Severity</th>
<th>Status</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="resourceTable"></tbody>

</table>

</div>



<div class="card">

<h3>Live Map View</h3>

<div id="map"></div>

</div>


</div>



<script>

let map=L.map('map').setView([30.3165,78.0322],11);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);



function loadResources(){

fetch("/resources")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("resourceTable");

table.innerHTML="";

map.eachLayer(layer=>{
if(layer instanceof L.Marker)
map.removeLayer(layer);
});

data.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.name}</td>
<td>${r.type}</td>
<td>${r.disasterType}</td>
<td>${r.severity}</td>
<td>${r.available?"✅":"❌"}</td>
<td>
<button class="delete-btn"
onclick="deleteResource(${r.id})">
Delete
</button>
</td>
</tr>
`;

L.marker([r.latitude,r.longitude])
.addTo(map)
.bindPopup(`<b>${r.name}</b><br>${r.type}<br>${r.disasterType}`);

});

});

}



function addResource(){

let resource={

name:name.value,
type:type.value,
disasterType:disasterType.value,
severity:severity.value,
latitude:parseFloat(latitude.value),
longitude:parseFloat(longitude.value),
available:available.value==="true"

};

fetch("/resources",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(resource)

}).then(()=>{

alert("Resource Added Successfully");

loadResources();

});

}



function deleteResource(id){

if(!confirm("Delete this resource?")) return;

fetch(`/resources/${id}`,{

method:"DELETE"

}).then(()=>{

alert("Resource Deleted");

loadResources();

});

}



function searchResource(){

fetch(`/resources/search/${searchBox.value}`)

.then(res=>res.json())

.then(console.log);

}



loadResources();

</script>

</body>
</html>
